# ============================================================================
# GATETEST QUALITY GATE — PROTECTED INTEGRATION FILE
# ============================================================================
# This workflow is a permanent integration between GateTest and a protected
# platform (Crontech / Gluecron). It MUST NOT be removed, weakened, or
# disabled without explicit authorization from Craig.
#
# See the GateTest Bible (CLAUDE.md) → "PROTECTED PLATFORMS" section.
# Install location in target repo: .github/workflows/gatetest-gate.yml
# Source of truth: https://github.com/crclabs-hq/gatetest
#                  /integrations/github-actions/gatetest-gate.yml
# ============================================================================

name: GateTest Quality Gate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write
  security-events: write
  checks: write
  # Required by github/codeql-action/upload-sarif — it calls
  # GET /repos/.../actions/runs/{id} for telemetry. Without this,
  # the SARIF upload step fails with a 403 "Resource not accessible
  # by integration" error, turning the whole job red even when the
  # gate itself passed.
  actions: read

concurrency:
  group: gatetest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gatetest:
    name: GateTest — Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22 matches our baseline (.holdenmercer / dev). Node 20
          # is EOL on the GH Actions deprecation list and emits noisy
          # warnings on every run.
          node-version: '22'

      - name: Clone GateTest (single source of truth)
        env:
          # Optional: set GATETEST_TOKEN in repo secrets if this repo is private
          GATETEST_TOKEN: ${{ secrets.GATETEST_TOKEN }}
        run: |
          if [ -n "$GATETEST_TOKEN" ]; then
            git clone --depth 1 "https://x-access-token:${GATETEST_TOKEN}@github.com/crclabs-hq/gatetest.git" "$RUNNER_TEMP/gatetest"
          else
            git clone --depth 1 "https://github.com/crclabs-hq/gatetest.git" "$RUNNER_TEMP/gatetest"
          fi
          echo "GATETEST_HOME=$RUNNER_TEMP/gatetest" >> $GITHUB_ENV
          echo "$RUNNER_TEMP/gatetest/bin" >> $GITHUB_PATH
          chmod +x "$RUNNER_TEMP/gatetest/bin/gatetest.js"

      - name: Install GateTest dependencies
        run: |
          cd "$RUNNER_TEMP/gatetest"
          npm ci --omit=dev --ignore-scripts 2>/dev/null || npm install --production --ignore-scripts 2>/dev/null || true

      - name: Verify GateTest installed
        run: node "$GATETEST_HOME/bin/gatetest.js" --version

      # --parallel runs all modules concurrently — ~3x speedup on GitHub
      # Actions' standard 4-vCPU runner. Each module is independent so
      # Promise.all is safe.
      # GITHUB_ACTIONS=true is set by every Actions runner, so the
      # GithubAnnotationsReporter auto-attaches without a flag — findings
      # render as inline annotations on the PR diff (red squiggles on the
      # offending line) instead of being buried in the run log.
      #
      # NOTE: --report-only is the FRESH-INSTALL default. The gate runs,
      # reports findings via SARIF + annotations + PR comments, but never
      # fails the workflow on a finding. This prevents the canonical
      # "scanner blocks production deploys on a mature codebase" failure
      # mode (the one that hit Crontech 2026-05-25 — the founder had to
      # disable GateTest to ship). Once the team has triaged the baseline
      # and wants the gate to enforce, change `--report-only` to `--strict`
      # in both invocations below.
      - name: GateTest — Quick (diff-mode) on PRs
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node "$GATETEST_HOME/bin/gatetest.js" --suite quick --diff --sarif --junit --parallel --report-only --project "$GITHUB_WORKSPACE"

      - name: GateTest — Full on main push
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node "$GATETEST_HOME/bin/gatetest.js" --suite full --sarif --junit --parallel --report-only --project "$GITHUB_WORKSPACE"

      - name: Upload SARIF to GitHub Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .gatetest/reports/gatetest-results.sarif
          category: gatetest

      - name: Upload GateTest reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gatetest-reports-${{ github.run_id }}
          path: |
            .gatetest/reports/
          retention-days: 30
          if-no-files-found: ignore

      # ----------------------------------------------------------------
      # GATETEST AUTO-REPAIR — ON BY DEFAULT.
      #
      # The gate without repair just blocks PRs. The novice then has to
      # translate every finding into a code change by hand. Auto-repair
      # lets the gate ALSO fix what it found and open a follow-up PR —
      # same model as Dependabot, only smarter.
      #
      # ENABLED automatically when ANTHROPIC_API_KEY is present as a
      # repository OR organization secret. Set it ONCE at the org level
      # (Settings → Secrets and variables → Actions → New organization
      # secret → name=ANTHROPIC_API_KEY) and every repo in the org gets
      # auto-repair without further setup.
      #
      # DISABLE per-repo by setting variable GATETEST_AUTOFIX = "off"
      # (Settings → Secrets and variables → Actions → Variables tab).
      #
      # Auto-repair failure NEVER masks the gate result — a dirty PR is
      # still blocked from merge until the auto-repair PR (or a manual
      # fix) clears the gate. The original failing PR is left untouched.
      # ----------------------------------------------------------------
      - name: Detect ANTHROPIC_API_KEY (for auto-repair gating)
        if: always()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Set without echoing — we never want the secret in logs. The
          # length check is enough to gate on presence.
          if [ -n "${ANTHROPIC_API_KEY:-}" ]; then
            echo "ANTHROPIC_KEY_PRESENT=yes" >> "$GITHUB_ENV"
          else
            echo "ANTHROPIC_KEY_PRESENT=no" >> "$GITHUB_ENV"
          fi

      - name: GateTest — AI auto-repair + auto-PR (default ON when key is present)
        if: failure() && env.ANTHROPIC_KEY_PRESENT == 'yes' && vars.GATETEST_AUTOFIX != 'off'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # --auto-pr does the whole flow in one step:
          #   1. Re-runs the scan to collect every actionable finding
          #   2. Calls the AI fix engine per finding (Claude-driven)
          #   3. Creates a new branch, commits the fixes
          #   4. Opens a pull request via the gh CLI
          #
          # Configure git identity so the auto-commit has a sensible author.
          git config user.email "auto-repair@gatetest.ai"
          git config user.name "GateTest Auto-Repair"

          # Capture all output so we can post it as a GitHub Actions
          # annotation even when stdout is hidden inside a long log.
          set +e
          OUTPUT=$(node "$GATETEST_HOME/bin/gatetest.js" --suite quick --auto-pr \
            --auto-pr-base "${{ github.head_ref || github.ref_name }}" \
            --auto-pr-branch "gatetest/auto-repair-${{ github.run_id }}" \
            --project "$GITHUB_WORKSPACE" 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$OUTPUT"

          # Surface the outcome as a GitHub Actions annotation so the
          # customer sees it on the PR summary page — not buried in logs.
          if echo "$OUTPUT" | grep -q "Fix PR opened:"; then
            PR_URL=$(echo "$OUTPUT" | grep -o "Fix PR opened: [^ ]*" | head -1 | sed 's/Fix PR opened: //')
            echo "::notice title=GateTest auto-repair PR opened::A follow-up PR with AI-generated fixes is available at $PR_URL"
          elif echo "$OUTPUT" | grep -q "No findings with file paths"; then
            echo "::warning title=GateTest auto-repair skipped::The gate failed but every finding lacks a file path. Auto-repair needs file-line metadata to apply fixes. This usually means the failing checks are config-level (e.g. CI workflow security) rather than file-level. Review the gate output and fix manually."
          elif echo "$OUTPUT" | grep -q "AI fix engine could not generate any fixes"; then
            echo "::warning title=GateTest auto-repair found no fixes::The fix engine ran on every finding but could not produce a verified fix. Common causes: file too large, unsupported language, or the finding wasn't a straightforward code change. See the per-finding [skipped:...] lines above for the reason."
          elif echo "$OUTPUT" | grep -q "Could not create branch"; then
            echo "::error title=GateTest auto-repair failed to create branch::Could not create the auto-repair branch. Common cause: a stale branch with the same name already exists. Workflow output above has the exact error."
          elif echo "$OUTPUT" | grep -q "gh CLI not found"; then
            echo "::error title=GateTest auto-repair: gh CLI missing::The GitHub CLI isn't on PATH in this runner. This is unusual — gh ships preinstalled on ubuntu-latest. Try re-running."
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "::warning title=GateTest auto-repair exited with errors::Auto-repair ran but reported errors (exit $EXIT_CODE). Output above. The original gate failure still stands."
          else
            echo "::notice title=GateTest auto-repair completed::No PR was opened — typically because the fix engine produced 0 changes. See log for per-finding breakdown."
          fi

          # NEVER block the workflow on auto-repair's own exit code.
          # The gate verdict from the earlier step is the source of truth.
          exit 0

      - name: Auto-repair not configured — surface as PR annotation (not just logs)
        if: failure() && env.ANTHROPIC_KEY_PRESENT != 'yes'
        run: |
          echo ""
          echo "============================================================"
          echo " GateTest auto-repair is NOT configured for this repo."
          echo ""
          echo " To turn it on for EVERY repo in your org in one step:"
          echo "   1. Go to: https://github.com/organizations/<your-org>/settings/secrets/actions"
          echo "   2. Click 'New organization secret'"
          echo "   3. Name:  ANTHROPIC_API_KEY"
          echo "      Value: <your Anthropic API key>"
          echo "   4. Repository access: 'All repositories' (or 'Selected')"
          echo "   5. Save."
          echo ""
          echo " Every future failing run in those repos will then ALSO open"
          echo " an auto-repair PR with Claude-generated fixes. No per-repo"
          echo " setup needed."
          echo "============================================================"
          # Annotation surfaces in the GitHub UI directly on the PR — not
          # buried in workflow logs. This is the single most-asked support
          # question, so we make sure it's visible.
          echo "::warning title=GateTest auto-repair not configured::The gate failed and there are findings to fix, but ANTHROPIC_API_KEY isn't set on this repo or the parent org. Add it ONCE at https://github.com/organizations/<your-org>/settings/secrets/actions (name: ANTHROPIC_API_KEY) and every future failing run will auto-open a fix PR. See workflow log for the full one-time setup steps."
