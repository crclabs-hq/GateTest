# ============================================================================
# GATETEST QUALITY GATE — PROTECTED INTEGRATION FILE
# ============================================================================
# This workflow is a permanent integration between GateTest and a protected
# platform (Crontech / Gluecron). It MUST NOT be removed, weakened, or
# disabled without explicit authorization from Craig.
#
# See the GateTest Bible (CLAUDE.md) → "PROTECTED PLATFORMS" section.
# Install location in target repo: .github/workflows/gatetest-gate.yml
# Source of truth: https://github.com/ccantynz-alt/gatetest
#                  /integrations/github-actions/gatetest-gate.yml
# ============================================================================

name: GateTest Quality Gate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write
  security-events: write
  checks: write

concurrency:
  group: gatetest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gatetest:
    name: GateTest — Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clone GateTest (single source of truth)
        env:
          # Optional: set GATETEST_TOKEN in repo secrets if this repo is private
          GATETEST_TOKEN: ${{ secrets.GATETEST_TOKEN }}
        run: |
          if [ -n "$GATETEST_TOKEN" ]; then
            git clone --depth 1 "https://x-access-token:${GATETEST_TOKEN}@github.com/ccantynz-alt/gatetest.git" "$RUNNER_TEMP/gatetest"
          else
            git clone --depth 1 "https://github.com/ccantynz-alt/gatetest.git" "$RUNNER_TEMP/gatetest"
          fi
          echo "GATETEST_HOME=$RUNNER_TEMP/gatetest" >> $GITHUB_ENV
          echo "$RUNNER_TEMP/gatetest/bin" >> $GITHUB_PATH
          chmod +x "$RUNNER_TEMP/gatetest/bin/gatetest.js"

      - name: Install GateTest dependencies
        run: |
          cd "$RUNNER_TEMP/gatetest"
          npm ci --omit=dev --ignore-scripts 2>/dev/null || npm install --production --ignore-scripts 2>/dev/null || true

      - name: Verify GateTest installed
        run: node "$GATETEST_HOME/bin/gatetest.js" --version

      - name: GateTest — Quick (diff-mode) on PRs
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node "$GATETEST_HOME/bin/gatetest.js" --suite quick --diff --sarif --junit --project "$GITHUB_WORKSPACE"

      - name: GateTest — Full on main push
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node "$GATETEST_HOME/bin/gatetest.js" --suite full --sarif --junit --project "$GITHUB_WORKSPACE"

      - name: Upload SARIF to GitHub Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .gatetest/reports/gatetest-results.sarif
          category: gatetest

      - name: Upload GateTest reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gatetest-reports-${{ github.run_id }}
          path: |
            .gatetest/reports/
          retention-days: 30
          if-no-files-found: ignore

      # ----------------------------------------------------------------
      # GATETEST AUTO-REPAIR — ON BY DEFAULT.
      #
      # The gate without repair just blocks PRs. The novice then has to
      # translate every finding into a code change by hand. Auto-repair
      # lets the gate ALSO fix what it found and open a follow-up PR —
      # same model as Dependabot, only smarter.
      #
      # ENABLED automatically when ANTHROPIC_API_KEY is present as a
      # repository OR organization secret. Set it ONCE at the org level
      # (Settings → Secrets and variables → Actions → New organization
      # secret → name=ANTHROPIC_API_KEY) and every repo in the org gets
      # auto-repair without further setup.
      #
      # DISABLE per-repo by setting variable GATETEST_AUTOFIX = "off"
      # (Settings → Secrets and variables → Actions → Variables tab).
      #
      # Auto-repair failure NEVER masks the gate result — a dirty PR is
      # still blocked from merge until the auto-repair PR (or a manual
      # fix) clears the gate. The original failing PR is left untouched.
      # ----------------------------------------------------------------
      - name: Detect ANTHROPIC_API_KEY (for auto-repair gating)
        if: always()
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Set without echoing — we never want the secret in logs. The
          # length check is enough to gate on presence.
          if [ -n "${ANTHROPIC_API_KEY:-}" ]; then
            echo "ANTHROPIC_KEY_PRESENT=yes" >> "$GITHUB_ENV"
          else
            echo "ANTHROPIC_KEY_PRESENT=no" >> "$GITHUB_ENV"
          fi

      - name: GateTest — AI auto-repair + auto-PR (default ON when key is present)
        if: failure() && env.ANTHROPIC_KEY_PRESENT == 'yes' && vars.GATETEST_AUTOFIX != 'off'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # --auto-pr does the whole flow in one step:
          #   1. Re-runs the scan to collect every actionable finding
          #   2. Calls the AI fix engine per finding (Claude-driven)
          #   3. Creates a new branch, commits the fixes
          #   4. Opens a pull request via the gh CLI
          #
          # This REPLACES the older `--fix` + peter-evans/create-pull-request
          # combo because (a) the new flow uses real AI fixes not just
          # runner-internal lint-fixers, (b) one CLI call instead of two
          # workflow steps, and (c) the PR body lists every finding +
          # which were fixed vs skipped.
          #
          # Configure git identity so the auto-commit has a sensible author.
          git config user.email "auto-repair@gatetest.ai"
          git config user.name "GateTest Auto-Repair"
          #
          # Failure here is logged but never blocks the workflow — the gate
          # verdict from the earlier step stands, so the original PR remains
          # blocked until the auto-repair PR is reviewed and merged.
          node "$GATETEST_HOME/bin/gatetest.js" --suite quick --auto-pr \
            --auto-pr-base "${{ github.head_ref || github.ref_name }}" \
            --auto-pr-branch "gatetest/auto-repair-${{ github.run_id }}" \
            --project "$GITHUB_WORKSPACE" \
            || echo "Auto-repair completed with some fixes skipped — see workflow log for the breakdown"

      - name: Auto-repair not configured — print one-shot setup steps
        if: failure() && env.ANTHROPIC_KEY_PRESENT != 'yes'
        run: |
          echo ""
          echo "============================================================"
          echo " GateTest auto-repair is NOT configured for this repo."
          echo ""
          echo " To turn it on for EVERY repo in your org in one step:"
          echo "   1. Go to: https://github.com/organizations/<your-org>/settings/secrets/actions"
          echo "   2. Click 'New organization secret'"
          echo "   3. Name:  ANTHROPIC_API_KEY"
          echo "      Value: <your Anthropic API key>"
          echo "   4. Repository access: 'All repositories' (or 'Selected')"
          echo "   5. Save."
          echo ""
          echo " Every future failing run in those repos will then ALSO open"
          echo " an auto-repair PR with Claude-generated fixes. No per-repo"
          echo " setup needed."
          echo "============================================================"
