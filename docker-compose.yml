services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gatetest
      POSTGRES_PASSWORD: gatetest
      POSTGRES_DB: gatetest
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gatetest"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://gatetest:gatetest@postgres:5432/gatetest?sslmode=disable
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "scripts/sandbox-worker.js"]
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://gatetest:gatetest@postgres:5432/gatetest?sslmode=disable
      GATETEST_BASE_URL: http://app:3000
      NODE_ENV: production
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres_data:
