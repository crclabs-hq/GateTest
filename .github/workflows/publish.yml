name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run only (no actual publish)'
        type: boolean
        default: false

permissions:
  contents: write   # for creating the GitHub Release on tag push
  id-token: write   # for npm provenance

jobs:
  publish:
    name: Test + Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify NPM_TOKEN is configured
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not set."
            echo ""
            echo "  HOW TO FIX (one-time setup, ~2 minutes):"
            echo ""
            echo "  1. On your laptop (with npm logged in):"
            echo "       npm token create"
            echo ""
            echo "  2. Copy the npm_xxxxxxxx string."
            echo ""
            echo "  3. In this repo on GitHub:"
            echo "       Settings -> Secrets and variables -> Actions"
            echo "       -> New repository secret"
            echo "       Name:  NPM_TOKEN"
            echo "       Value: (paste the npm_xxxxxxxx string)"
            echo ""
            echo "  4. Re-run this workflow."
            echo ""
            echo "  After that, every 'git push --tags' auto-publishes."
            exit 1
          fi
          echo "NPM_TOKEN is set ✓"

      - name: Install deps
        run: npm ci

      - name: Verify all 120 modules load
        run: node bin/gatetest.js --list >/dev/null

      - name: Run test suite
        run: node --test tests/*.test.js

      - name: Verify package version matches the git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME ($TAG_VERSION) does not match package.json version ($PKG_VERSION)."
            echo "Run: npm version $TAG_VERSION --no-git-tag-version  (then commit + retag)"
            exit 1
          fi
          echo "Tag matches package.json version ✓"

      # Diagnostics: surfaces the npm identity + registry the token resolves
      # to BEFORE publish. When publish 404s, the log already contains the
      # info needed to diagnose: wrong account, wrong registry, or token
      # without publish scope (whoami succeeds for any valid token but
      # PUT 404s when the token lacks publish rights for the package name).
      - name: npm whoami (diagnostic)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "Registry: $(npm config get registry)"
          if ! WHO=$(npm whoami 2>&1); then
            echo "::error::npm whoami failed — token is invalid or expired."
            echo "$WHO"
            exit 1
          fi
          echo "npm identity: $WHO"

      - name: npm publish (dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --dry-run

      - name: npm publish
        if: "!(github.event_name == 'workflow_dispatch' && inputs.dry_run == true)"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if ! npm publish --access public --provenance 2> /tmp/npm-publish-err; then
            cat /tmp/npm-publish-err
            if grep -qE "E404|404 Not Found.*PUT" /tmp/npm-publish-err; then
              echo ""
              echo "::error::npm returned E404 on PUT. Name 'gatetest' is free but the token can't create it."
              echo ""
              echo "  npm masks four different auth/permission failures as 404 on first publish."
              echo "  Most likely (in order):"
              echo ""
              echo "  1. NPM_TOKEN is a GRANULAR access token without 'gatetest' (or the right org)"
              echo "     in its package scope. Granular tokens default to no packages."
              echo "     Fix: regenerate as a CLASSIC Automation token via 'npm token create' on the CLI"
              echo "          (NOT via npmjs.com -> Settings -> Granular tokens)."
              echo ""
              echo "  2. NPM_TOKEN is READ-ONLY (Read & List), not Publish."
              echo "     Fix: regenerate via 'npm token create' which creates a publish-scope token."
              echo ""
              echo "  3. The npm account has 2FA mode 'Authorization and Publishing'. That mode blocks"
              echo "     automation tokens entirely (every publish requires an OTP)."
              echo "     Fix: npmjs.com -> Profile Settings -> Two-Factor Authentication ->"
              echo "          set to 'Authorization only'. Then re-run 'npm token create'."
              echo ""
              echo "  4. NPM_TOKEN belongs to a different npm account than expected."
              echo "     Compare 'npm identity' from the diagnostic step above."
              echo ""
              echo "  After fixing the token, update the NPM_TOKEN repo secret and re-run this workflow."
            fi
            exit 1
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && !cancelled()
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
