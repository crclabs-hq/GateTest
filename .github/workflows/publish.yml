name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run only (no actual publish)'
        type: boolean
        default: false

permissions:
  contents: write   # for creating the GitHub Release on tag push
  id-token: write   # for npm provenance AND OIDC trusted publishing

jobs:
  publish:
    name: Test + Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Auth model (2026-07-25, Craig + npm's token changes): OIDC trusted
      # publishing — npmjs.com > @gatetest/cli > Settings > Trusted Publisher
      # is configured with (GitHub Actions, crclabs-hq / GateTest,
      # publish.yml, no environment). No NPM_TOKEN secret, no expiry, no
      # OTP. The 2026-07-24 token attempts died on EOTP because the
      # account's 2FA mode demands a one-time code from ANY token auth;
      # OIDC sidesteps tokens entirely.
      #
      # Node 22 bundles npm 10.x, which predates trusted publishing —
      # npm >= 11.5.1 is required for the OIDC exchange.
      - name: Update npm for OIDC trusted publishing
        run: |
          npm install -g npm@latest
          echo "npm $(npm --version)"

      - name: Install deps
        run: npm ci

      - name: Verify all 120 modules load
        run: node bin/gatetest.js --list >/dev/null

      - name: Run test suite
        # --test-force-exit is required: the bare `node --test` form hangs
        # (leaked timer/socket keeps the runner alive) — same fix ci.yml got
        # in 180bf7c; this workflow was missed, which is why past publish
        # runs stalled or were cancelled.
        run: node --test --test-force-exit --test-timeout=60000 tests/*.test.js

      - name: Verify package version matches the git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME ($TAG_VERSION) does not match package.json version ($PKG_VERSION)."
            echo "Run: npm version $TAG_VERSION --no-git-tag-version  (then commit + retag)"
            exit 1
          fi
          echo "Tag matches package.json version ✓"

      - name: npm publish (dry-run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
        run: npm publish --access public --dry-run

      - name: npm publish
        if: "!(github.event_name == 'workflow_dispatch' && inputs.dry_run == true)"
        run: |
          if ! npm publish --access public --provenance 2> /tmp/npm-publish-err; then
            cat /tmp/npm-publish-err
            if grep -qE "ENEEDAUTH|E401|E404|EOTP" /tmp/npm-publish-err; then
              echo ""
              echo "::error::npm auth failed. This workflow publishes via OIDC trusted publishing — no token."
              echo ""
              echo "  Checklist (npmjs.com, logged in as the package owner):"
              echo ""
              echo "  1. Package page -> @gatetest/cli -> Settings -> Trusted Publisher:"
              echo "       Publisher:          GitHub Actions"
              echo "       Organization/user:  crclabs-hq"
              echo "       Repository:         GateTest"
              echo "       Workflow filename:  publish.yml"
              echo "       Environment name:   (leave blank)"
              echo "       Allowed actions:    Publish (at minimum)"
              echo ""
              echo "  2. The org/repo must match GitHub's CANONICAL name for this repo"
              echo "     (crclabs-hq/GateTest — the ccantynz-alt/gatetest URL is an alias)."
              echo ""
              echo "  3. EOTP specifically means npm fell back to TOKEN auth — if an NPM_TOKEN"
              echo "     secret still exists and npm is too old for OIDC, delete the secret or"
              echo "     check the 'Update npm' step above printed npm >= 11.5.1."
            fi
            exit 1
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && !cancelled()
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
