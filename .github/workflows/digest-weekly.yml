name: Weekly Developer Digest

# Fires every Monday at 08:00 UTC — just in time for the start of the
# engineering week. Calls POST /api/digest on the live deployment, which
# iterates every active Continuous subscriber and sends them:
#   - A Slack digest (if SLACK_WEBHOOK_URL or per-repo webhook configured)
#   - An email digest (if RESEND_API_KEY is set and customer email is known)
#
# Secrets needed in the repo:
#   GATETEST_ADMIN_PASSWORD  — must match the env var in Vercel
#   GATETEST_BASE_URL        — default https://gatetest.ai; override for staging

on:
  schedule:
    - cron: '0 8 * * 1'    # Every Monday at 08:00 UTC
  workflow_dispatch:        # Manual trigger from GitHub Actions UI

permissions:
  contents: read

jobs:
  send-digest:
    name: Send weekly digest
    runs-on: ubuntu-latest
    steps:
      - name: Trigger digest via API
        id: trigger
        env:
          ADMIN_PASSWORD: ${{ secrets.GATETEST_ADMIN_PASSWORD }}
          BASE_URL: ${{ vars.GATETEST_BASE_URL || 'https://gatetest.ai' }}
        run: |
          echo "Triggering weekly digest at ${BASE_URL}/api/digest"

          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -X POST "${BASE_URL}/api/digest" \
            -H "Authorization: Bearer ${ADMIN_PASSWORD}" \
            -H "Content-Type: application/json" \
            --max-time 180 \
            2>&1)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP status: ${HTTP_CODE}"
          echo "Response: ${BODY}"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Digest API returned HTTP ${HTTP_CODE}"
            exit 1
          fi

          SENT=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sent',0))" 2>/dev/null || echo "0")
          FAILED=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('failed',0))" 2>/dev/null || echo "0")
          SKIPPED=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('skipped',0))" 2>/dev/null || echo "0")

          echo "Digest complete — sent: ${SENT}, failed: ${FAILED}, skipped: ${SKIPPED}"
          echo "sent=${SENT}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED}" >> "$GITHUB_OUTPUT"

      - name: Fail if delivery errors occurred
        if: ${{ steps.trigger.outputs.failed != '0' }}
        run: |
          echo "::warning::${failed} digest(s) failed to deliver. Check /api/digest logs in Vercel."
