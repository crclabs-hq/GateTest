name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  gate:
    name: GateTest Quality Gate
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run GateTest quick scan
        run: node bin/gatetest.js --suite quick --sarif --junit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .gatetest/reports/
        continue-on-error: true

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gatetest-report
          path: .gatetest/reports/
          retention-days: 30

  full-scan:
    name: GateTest Full Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run GateTest full scan
        run: node bin/gatetest.js --suite full --sarif --junit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .gatetest/reports/
        continue-on-error: true

      - name: Upload full scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gatetest-full-report
          path: .gatetest/reports/
          retention-days: 90
