name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Fast TypeScript gate — runs first, blocks the slower test + build jobs
  # on type errors. Catches the cache-cold Vercel regressions that have
  # been slipping through Next.js's build-time tsc (we've had 4 in 24h:
  # AdaptiveState duplicate, turbopack dynamic require, orphan tracker,
  # AuthFailure.headers). `tsc --noEmit` is ~10s vs ~2-3min for the full
  # build — fast feedback, clear failure message, no Turbopack noise.
  typecheck:
    name: TypeScript (website)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install all workspaces
        run: bash scripts/install-workspaces.sh

      - name: Run tsc --noEmit
        run: cd website && npx tsc --noEmit

  # Heavy tests — subprocess-heavy, CLI-driven, real-timer tests that would
  # bloat the fast gate. Runs in parallel from t=0 (no `needs`), so it never
  # delays the blocking path. NOT in required checks — a failure marks the
  # check red + posts a step summary but never blocks a merge. The fast gate
  # (test job + pre-merge-sweep) is the actual enforcement layer.
  # Bible Forbidden #24: NO continue-on-error on the test step itself.
  heavy-tests:
    name: Heavy Tests (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install all workspaces
        run: bash scripts/install-workspaces.sh

      - name: Install website dependencies
        run: cd website && npm ci

      - name: Run heavy test suite
        id: heavy
        run: |
          set -o pipefail
          node --test --test-force-exit --test-timeout=120000 tests/heavy/*.test.js | tee /tmp/heavy-suite.tap
          STATUS=${PIPESTATUS[0]}
          if [ "$STATUS" -ne 0 ]; then
            echo "## Heavy test failures" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep -A 12 "^not ok " /tmp/heavy-suite.tap | head -100 >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit "$STATUS"
          fi

      - name: Post summary on success
        if: success()
        run: |
          PASS=$(grep -c "^ok " /tmp/heavy-suite.tap || echo 0)
          echo "## Heavy tests: $PASS passed" >> "$GITHUB_STEP_SUMMARY"

  test:
    name: Test + Build
    runs-on: ubuntu-latest
    needs: typecheck
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install all workspaces
        run: bash scripts/install-workspaces.sh

      - name: Install website dependencies (some tests require @babel/* via website helpers)
        run: cd website && npm ci

      - name: Run tests
        run: npm test

      - name: Build website
        run: cd website && npm run build

  gatetest:
    name: GateTest Quality Gate
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    permissions:
      security-events: write
      contents: read
      # Required by github/codeql-action/upload-sarif — it calls the
      # workflow-runs API to attach SARIF results to the right run.
      # Without this, the upload step fails with "Resource not accessible
      # by integration", turning the job red even when the gate passed.
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history needed so `--diff` can compute the merge-base
          # against main for incremental scans on PRs. Without this,
          # checkout defaults to depth=1 and the merge-base lookup falls
          # back to full scan, costing the speedup.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install all workspaces
        run: bash scripts/install-workspaces.sh

      - name: Run GateTest quick scan
        # --confidence-threshold 0.95 downgrades low-confidence error findings
        # to "soft" (visible in report, don't block the gate). Used on this
        # SARIF-upload job because its primary purpose is feeding the GitHub
        # Security tab — the strict blocking gate is the `self-scan` job
        # below, which runs with the default 0.7 threshold.
        # --diff scans only files changed vs merge-base with main (PR) or
        # HEAD~1 (push). PR scan drops from ~30s to ~3-10s. Falls back to
        # full scan when no merge-base resolvable (initial commit, etc).
        run: node bin/gatetest.js --suite quick --sarif --junit --confidence-threshold 0.95 --parallel --diff
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .gatetest/reports/
        continue-on-error: true

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gatetest-report
          path: .gatetest/reports/
          retention-days: 30

  # Self-scan gate — the SAME quick scan we sell to customers must pass on
  # OUR repo before any merge. Catches the "shipped a scanner that flags
  # itself" bug class. Bible Forbidden #24 — NO continue-on-error on the
  # gate step. If the gate is BLOCKED, this job fails the workflow.
  self-scan:
    name: GateTest Self-Scan (Dogfood Gate)
    runs-on: ubuntu-latest
    needs: gatetest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install all workspaces
        run: bash scripts/install-workspaces.sh

      - name: Run quick self-scan against the gatetest repo itself
        # JsonReporter is always attached — produces
        # .gatetest/reports/gatetest-report-latest.json which the
        # publish step parses for the live trust badge.
        # --parallel runs the 40+ modules concurrently (~3x speedup on
        # 8-core runners). Module checks are CPU-bound but each module
        # is independent, so Promise.all is safe — no shared mutable state.
        run: node bin/gatetest.js --suite quick --parallel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Best-effort publish of the self-scan result to gatetest.ai for
      # the live trust badge. Fail-soft — `publish-self-scan.js` always
      # exits 0 so a network blip or missing token never breaks CI.
      - name: Publish self-scan stats to live badge endpoint
        if: always()
        run: node scripts/publish-self-scan.js
        env:
          GATETEST_INTERNAL_TOKEN: ${{ secrets.GATETEST_INTERNAL_TOKEN }}
          SELF_SCAN_STATUS_URL: ${{ vars.SELF_SCAN_STATUS_URL }}

  # Pre-merge sweep — every check that would block a hand-merge runs here
  # as a SEPARATE STEP, so one failure doesn't hide three others. Runs on
  # every PR. This is the "did the sweep actually pass?" enforcement.
  pre-merge-sweep:
    name: Pre-Merge Sweep
    runs-on: ubuntu-latest
    needs: typecheck
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install all workspaces
        run: bash scripts/install-workspaces.sh

      - name: All tests pass
        run: |
          set -o pipefail
          # --test-force-exit: a test file that leaves a timer/socket/child
          # open otherwise keeps node --test alive forever (this was the 2.5h
          # hang). --test-timeout: bound any single genuinely-stuck test.
          node --test --test-force-exit --test-timeout=60000 tests/*.test.js | tee /tmp/test-suite.tap
          STATUS=${PIPESTATUS[0]}
          if [ "$STATUS" -ne 0 ]; then
            echo ""
            echo "=========================================================="
            echo "  TEST FAILURES (extracted for CI-log-tail visibility):"
            echo "=========================================================="
            grep -A 12 "^not ok " /tmp/test-suite.tap || echo "(no 'not ok' lines found — failure may be a process-level error)"
            echo "=========================================================="
            exit "$STATUS"
          fi

      - name: Website builds clean
        run: cd website && npx next build

      - name: Lint (src/bin/lib/integrations)
        run: npm run lint

      - name: All modules load (assert >= 90)
        run: |
          OUTPUT="$(node bin/gatetest.js --list)"
          echo "$OUTPUT"
          LINES="$(printf '%s\n' "$OUTPUT" | wc -l)"
          echo "module list line count: $LINES"
          if [ "$LINES" -lt 90 ]; then
            echo "FAIL: expected at least 90 module-list lines, got $LINES" >&2
            exit 1
          fi

      - name: Self-scan green
        run: node bin/gatetest.js --suite quick --parallel

      - name: No committed secrets in tracked files
        run: |
          # Look for high-shape secret patterns in tracked files, excluding
          # docs/tests/examples paths and the .gitignore itself.
          PATTERN='AKIA[0-9A-Z]{16}|AKIB[0-9A-Z]{16}|ASIA[0-9A-Z]{16}|sk_live_[0-9a-zA-Z]{24,}|sk_test_[0-9a-zA-Z]{24,}|ghp_[0-9a-zA-Z]{36,}|github_pat_[0-9a-zA-Z_]{60,}|glpat-[0-9a-zA-Z_-]{20,}|SG\.[0-9a-zA-Z_-]{22,}\.[0-9a-zA-Z_-]{43,}'
          FILES="$(git ls-files | grep -Ev '^(\.gitignore|\.env\.example|tests/|docs/)' || true)"
          if [ -z "$FILES" ]; then
            echo "no tracked files to scan"
            exit 0
          fi
          HITS="$(printf '%s\n' "$FILES" | xargs -d '\n' grep -EnH "$PATTERN" 2>/dev/null || true)"
          if [ -n "$HITS" ]; then
            echo "FAIL: secret-shape strings found in tracked files:" >&2
            printf '%s\n' "$HITS" >&2
            exit 1
          fi
          echo "no secret-shape strings found"

      - name: TODO/FIXME count (informational, never fails)
        run: |
          COUNT="$(git grep -EnI 'TODO|FIXME' -- 'src/**/*.js' 'src/**/*.ts' 'website/app/**/*.ts' 'website/app/**/*.tsx' 'website/app/**/*.js' 2>/dev/null | wc -l || echo 0)"
          echo "TODO/FIXME occurrences in src/ and website/app/: $COUNT"

  gatetest-full:
    name: GateTest Full Scan (Push to main)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      security-events: write
      contents: read
      # Required by github/codeql-action/upload-sarif — see comment on
      # the `gatetest` job above. Without this, every push to main has
      # a red SARIF-upload step even when the gate verdict is green.
      actions: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install all workspaces
        run: bash scripts/install-workspaces.sh

      - name: Run GateTest full scan
        # --confidence-threshold 0.95 — same rationale as the quick-scan job
        # above. This is the SARIF-feeding job, not the dogfood gate. The
        # strict `self-scan` job keeps the default 0.7 and is the one that
        # decides whether main is green.
        # --skip-module mutation — mutation testing mutates source files and
        # re-runs the full test suite per mutation (~28 min in CI). It's run
        # nightly via .github/workflows/nightly-mutation.yml instead so the
        # main CI gate stays under 5 min.
        run: node bin/gatetest.js --suite quick --sarif --junit --confidence-threshold 0.95 --parallel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .gatetest/reports/
        continue-on-error: true

      - name: Upload full scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gatetest-full-report
          path: .gatetest/reports/
          retention-days: 90
