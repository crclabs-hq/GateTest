name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Fast TypeScript gate — runs first, blocks the slower test + build jobs
  # on type errors. Catches the cache-cold Vercel regressions that have
  # been slipping through Next.js's build-time tsc (we've had 4 in 24h:
  # AdaptiveState duplicate, turbopack dynamic require, orphan tracker,
  # AuthFailure.headers). `tsc --noEmit` is ~10s vs ~2-3min for the full
  # build — fast feedback, clear failure message, no Turbopack noise.
  typecheck:
    name: TypeScript (website)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        run: cd website && npm ci

      - name: Run tsc --noEmit
        run: cd website && npx tsc --noEmit

  test:
    name: Test + Build
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build website
        run: cd website && npm ci && npm run build

  gatetest:
    name: GateTest Quality Gate
    runs-on: ubuntu-latest
    needs: test
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run GateTest quick scan
        run: node bin/gatetest.js --suite quick --sarif --junit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .gatetest/reports/
        continue-on-error: true

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gatetest-report
          path: .gatetest/reports/
          retention-days: 30

  gatetest-full:
    name: GateTest Full Scan (Push to main)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run GateTest full scan
        run: node bin/gatetest.js --suite full --sarif --junit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .gatetest/reports/
        continue-on-error: true

      - name: Upload full scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gatetest-full-report
          path: .gatetest/reports/
          retention-days: 90
