name: Flywheel Trainer — Nightly

# Runs every night at 03:00 UTC. Ingests the last 30d of git history into
# the session-fix corpus, runs all 8 flywheel trainers, and opens a PR
# (or appends to an existing one) with the combined report.
#
# Trainer inventory:
#   1. pattern-miner          — recurring patterns + under-tested modules
#   2. recipe-promoter        — patterns → recipe proposals
#   3. recipe-auto-promoter   — high-confidence swaps → pending rule files
#   4. regression-test-generator — under-tested modules → .pending.test.js
#   5. cross-repo-promoter    — anonymised structural rewrite vectors
#   6. confidence-calibrator  — dismissal rates → severity downgrades
#   7. adversarial-mutator    — self-tests the gate by mutating known-good code
#   8. hacker-news-monitor    — HN mentions + competitor pain-points → drafts
#                               FOR CRAIG REVIEW (read-only API, never posts;
#                               wiring authorized by Craig 2026-06-12)
#
# Read-only on source code. NEVER modifies modules / tests / rules directly.
# Generated pending files (rule-based-fixer-pending/, tests/auto-generated/)
# land in the trainer PR for human review before they become real rules.

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC nightly
  workflow_dispatch:       # manual run from Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  train:
    name: Train flywheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for ingestion)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # we need the full git log

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install (no-op if no deps)
        run: |
          if [ -f package-lock.json ]; then
            npm ci --ignore-scripts || true
          fi

      - name: Ingest last 30d of git history into session-fix corpus
        run: |
          node -e "
            const ST = require('./website/app/lib/session-telemetry.js');
            const stats = ST.ingestGitHistory({ since: '30 days ago' });
            console.log('ingest:', JSON.stringify(stats));
          "

      - name: Run pattern-miner trainer
        id: train
        run: |
          mkdir -p .gatetest-train
          node website/app/lib/trainers/pattern-miner.js > .gatetest-train/report.md
          # Also dump the raw JSON next to the report
          node -e "
            const PM = require('./website/app/lib/trainers/pattern-miner.js');
            PM.mine().then((r) => {
              require('fs').writeFileSync('.gatetest-train/report.json', JSON.stringify(r, null, 2));
            });
          "
          # Surface report length so a downstream step can decide whether to PR
          echo "lines=$(wc -l < .gatetest-train/report.md)" >> "$GITHUB_OUTPUT"

      - name: Run recipe-promoter trainer
        run: |
          node website/app/lib/trainers/recipe-promoter.js > .gatetest-train/recipe-promoter.md
          node -e "
            const RP = require('./website/app/lib/trainers/recipe-promoter.js');
            RP.propose().then((r) => {
              require('fs').writeFileSync('.gatetest-train/recipe-promoter.json', JSON.stringify(r, null, 2));
            });
          "

      - name: Run regression-test-generator trainer
        run: |
          # Trainer writes pending tests under tests/auto-generated/.
          # Files committed to the trainer PR for human review.
          node website/app/lib/trainers/regression-test-generator.js > .gatetest-train/regression-test-generator.md
          node -e "
            const RTG = require('./website/app/lib/trainers/regression-test-generator.js');
            RTG.generate().then((r) => {
              require('fs').writeFileSync('.gatetest-train/regression-test-generator.json', JSON.stringify(r, null, 2));
            });
          "

      - name: Run adversarial-mutator trainer (self-test the gate)
        # Budgeted: 10 files × 5 mutations × quick suite. Caps wall time.
        timeout-minutes: 30
        run: |
          node website/app/lib/trainers/adversarial-mutator.js > .gatetest-train/adversarial-mutator.md
          # JSON written by the CLI's main() directly to ~/.gatetest/trainers/
          # — copy it into the artifact bundle.
          if [ -f "$HOME/.gatetest/trainers/adversarial-mutator-latest.json" ]; then
            cp "$HOME/.gatetest/trainers/adversarial-mutator-latest.json" .gatetest-train/adversarial-mutator.json
          fi

      - name: Run recipe-auto-promoter trainer
        # Reads recipe-promoter proposals → generates pending rule files
        # under website/app/lib/rule-based-fixer-pending/ for human review.
        # Only operates on high-confidence token-swap proposals (≥2 agreeing
        # commits) — never auto-applies rules. Fails silently when corpus
        # is thin (e.g. first run): no proposals → no pending files.
        run: |
          node website/app/lib/trainers/recipe-auto-promoter.js > .gatetest-train/recipe-auto-promoter.md || true
          if [ -f "$HOME/.gatetest/trainers/recipe-auto-promoter-latest.json" ]; then
            cp "$HOME/.gatetest/trainers/recipe-auto-promoter-latest.json" .gatetest-train/recipe-auto-promoter.json
          fi

      - name: Run cross-repo-promoter trainer
        # Reads local session-fix corpus → builds anonymised structural
        # rewrite vectors in ~/.gatetest/cross-repo-corpus/.
        # No-op when corpus is empty. SOC2-safe: customer strings never
        # leave the local store.
        run: |
          node website/app/lib/trainers/cross-repo-promoter.js > .gatetest-train/cross-repo-promoter.md || true
          if [ -f "$HOME/.gatetest/trainers/cross-repo-promoter-latest.json" ]; then
            cp "$HOME/.gatetest/trainers/cross-repo-promoter-latest.json" .gatetest-train/cross-repo-promoter.json
          fi

      - name: Run confidence-calibrator trainer
        # Reads finding_dismissals from the DB (gracefully degrades when
        # DATABASE_URL is unset) → recommends per-rule severity downgrades.
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          node website/app/lib/trainers/confidence-calibrator.js > .gatetest-train/confidence-calibrator.md || true
          if [ -f "$HOME/.gatetest/trainers/confidence-calibrator-latest.json" ]; then
            cp "$HOME/.gatetest/trainers/confidence-calibrator-latest.json" .gatetest-train/confidence-calibrator.json
          fi

      - name: Run hacker-news-monitor trainer
        # Read-only sweep of the public HN Algolia API: GateTest mentions,
        # competitor pain-points, draft replies marked FOR CRAIG REVIEW.
        # Never posts anywhere. Authorized by Craig 2026-06-12 (Boss Rule #7).
        run: |
          node website/app/lib/trainers/hacker-news-monitor.js > .gatetest-train/hacker-news.md || true
          if [ -f "$HOME/.gatetest/trainers/hacker-news-latest.json" ]; then
            cp "$HOME/.gatetest/trainers/hacker-news-latest.json" .gatetest-train/hacker-news.json
          fi

      - name: Upload trainer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flywheel-trainer-${{ github.run_id }}
          path: .gatetest-train/
          retention-days: 90

      - name: Open / update trainer PR
        if: steps.train.outputs.lines != '' && steps.train.outputs.lines != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          BRANCH="flywheel/trainer-report-$(date -u +%Y%m%d)"
          git config user.name  "gatetest-trainer[bot]"
          git config user.email "gatetest-trainer@users.noreply.github.com"
          git checkout -b "$BRANCH" || git checkout "$BRANCH"

          mkdir -p docs/trainer
          DATE=$(date -u +%Y-%m-%d)
          cp .gatetest-train/report.md                   "docs/trainer/${DATE}-pattern-miner.md"
          cp .gatetest-train/report.json                 "docs/trainer/${DATE}-pattern-miner.json"
          cp .gatetest-train/recipe-promoter.md          "docs/trainer/${DATE}-recipe-promoter.md"  2>/dev/null || true
          cp .gatetest-train/recipe-promoter.json        "docs/trainer/${DATE}-recipe-promoter.json" 2>/dev/null || true
          cp .gatetest-train/regression-test-generator.md "docs/trainer/${DATE}-regression-test-generator.md"  2>/dev/null || true
          cp .gatetest-train/regression-test-generator.json "docs/trainer/${DATE}-regression-test-generator.json" 2>/dev/null || true
          cp .gatetest-train/adversarial-mutator.md "docs/trainer/${DATE}-adversarial-mutator.md"  2>/dev/null || true
          cp .gatetest-train/adversarial-mutator.json "docs/trainer/${DATE}-adversarial-mutator.json" 2>/dev/null || true
          cp .gatetest-train/recipe-auto-promoter.md "docs/trainer/${DATE}-recipe-auto-promoter.md"  2>/dev/null || true
          cp .gatetest-train/recipe-auto-promoter.json "docs/trainer/${DATE}-recipe-auto-promoter.json" 2>/dev/null || true
          cp .gatetest-train/cross-repo-promoter.md "docs/trainer/${DATE}-cross-repo-promoter.md"  2>/dev/null || true
          cp .gatetest-train/cross-repo-promoter.json "docs/trainer/${DATE}-cross-repo-promoter.json" 2>/dev/null || true
          cp .gatetest-train/confidence-calibrator.md "docs/trainer/${DATE}-confidence-calibrator.md"  2>/dev/null || true
          cp .gatetest-train/confidence-calibrator.json "docs/trainer/${DATE}-confidence-calibrator.json" 2>/dev/null || true
          cp .gatetest-train/hacker-news.md "docs/trainer/${DATE}-hacker-news.md"  2>/dev/null || true
          cp .gatetest-train/hacker-news.json "docs/trainer/${DATE}-hacker-news.json" 2>/dev/null || true

          # recipe-auto-promoter writes pending rule files here for review
          if [ -d website/app/lib/rule-based-fixer-pending ]; then
            git add website/app/lib/rule-based-fixer-pending/ || true
          fi

          # regression-test-generator writes pending test stubs here
          if [ -d tests/auto-generated ]; then
            git add tests/auto-generated/ || true
          fi

          git add docs/trainer/
          if git diff --cached --quiet; then
            echo "no changes — skipping PR"
            exit 0
          fi
          git -c commit.gpgsign=false commit -m "chore(trainer): all-8-trainers report $(date -u +%Y-%m-%d)"
          git push -u origin "$BRANCH" --force-with-lease

          # Create PR (idempotent — gh fails harmlessly if PR exists)
          PR_BODY=$(printf '## Nightly flywheel trainer report (%s)\n\nAll 8 trainers ran. Review each section and merge to land reports in docs/trainer/.\n\n**Pending rule files** (if any) are under `website/app/lib/rule-based-fixer-pending/` — verify the source SHAs in the header comment, then move the rule into `rule-based-fixer.js` RULES array.\n\n**Pending test stubs** (if any) are under `tests/auto-generated/*.pending.test.js` — fill in assertions and rename to `.test.js` to activate.' "$(date -u +%Y-%m-%d)")
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Flywheel trainer report — $(date -u +%Y-%m-%d)" \
            --body "$PR_BODY" \
            --draft \
          || gh pr edit "$BRANCH" --body "Updated $(date -u +%Y-%m-%dT%H:%M:%SZ)"
