# ============================================================================
# GateTest — Composite GitHub Action
# ============================================================================
# Lets any repo run the GateTest gate (102 modules) with a single
# `uses: crclabs-hq/GateTest@v1.1.1` line in their workflow.
#
# Optional AI auto-repair: when `auto-fix: true` AND the gate blocks AND
# the workflow exposes ANTHROPIC_API_KEY, the action invokes the AI
# CI-fixer (scripts/ai-ci-fixer.js) to propose a patch.
#
# The gate verdict is the source of truth — auto-repair NEVER masks a
# failing gate (Bible Forbidden #24). On any auto-repair failure the
# original gate exit code stands.
# ============================================================================

name: 'GateTest Quality Gate'
description: '102-module AI-powered quality gate with self-healing CI'
author: 'GateTest (gatetest.ai)'

branding:
  icon: 'shield'
  color: 'purple'

inputs:
  suite:
    description: 'Which GateTest suite to run: quick (4 modules) / full (102) / scan_fix / nuclear'
    required: false
    default: 'quick'
  auto-fix:
    description: 'When true and the gate blocks, run the AI CI-fixer to propose a patch (requires ANTHROPIC_API_KEY).'
    required: false
    default: 'false'
  node-version:
    description: 'Node.js version to use (GateTest requires Node 20+).'
    required: false
    default: '22'
  working-directory:
    description: 'Directory to scan. Defaults to the repository root.'
    required: false
    default: '.'
  report-format:
    description: 'Report format produced by the gate: console / json / sarif / junit.'
    required: false
    default: 'console'
  fail-on-warning:
    description: 'When true, warning-severity findings also block the gate (default is errors-only).'
    required: false
    default: 'false'
  track-non-fixable:
    description: 'Open a GitHub Issue per error-severity finding the auto-fixer could not resolve. Idempotent — re-scans never duplicate. Default off.'
    required: false
    default: 'false'
  share-learnings:
    description: 'OPT-IN: sync successful fix recipes (anonymised — no paths, no repo names, no source code outside the 2KB before/after snippet) to gatetest.ai so every other customer benefits from this fix. Default off. See https://gatetest.ai/trust for what is and is not shared.'
    required: false
    default: 'false'
  recipe-store-url:
    description: 'HTTP endpoint to sync fix recipes to. Defaults to https://gatetest.ai/api/recipes when share-learnings is true. Set to your own URL for a private recipe store (the Action will sync there instead).'
    required: false
    default: ''
  mutation:
    description: 'Run mutation testing after the gate (Nuclear tier or opt-in). Requires the customer test suite to run.'
    required: false
    default: 'false'
  chaos:
    description: 'Run live-browser chaos / runtime checks against a URL (Nuclear tier or opt-in). Requires playwright.'
    required: false
    default: 'false'
  chaos-url:
    description: 'Live URL to chaos-test (deployed staging or prod, NOT localhost). Required when chaos: true.'
    required: false
    default: ''
  mutation-blocks-merge:
    description: 'When true, a failing mutation score blocks the merge. Default false — mutation is coaching, not a gate.'
    required: false
    default: 'false'
  chaos-blocks-merge:
    description: 'When true, chaos / runtime failures block the merge. Default false — chaos surfaces resilience gaps as warnings.'
    required: false
    default: 'false'

outputs:
  gate-status:
    description: 'The gate verdict: "passed" or "blocked".'
    value: ${{ steps.gate.outputs.gate-status }}
  error-count:
    description: 'Number of error-severity findings from the scan.'
    value: ${{ steps.gate.outputs.error-count }}
  warning-count:
    description: 'Number of warning-severity findings from the scan.'
    value: ${{ steps.gate.outputs.warning-count }}
  report-path:
    description: 'Filesystem path to the generated report (empty when report-format is "console").'
    value: ${{ steps.gate.outputs.report-path }}

runs:
  using: 'composite'
  steps:
    # ----------------------------------------------------------------------
    # 1. Setup Node.js (GateTest requires Node 20+).
    # ----------------------------------------------------------------------
    - name: Setup Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    # ----------------------------------------------------------------------
    # 2. Install GateTest.
    # First try the published npm package; fall back to cloning the repo
    # if the package isn't published yet.
    # TODO(publish): swap the fallback for `npm install -g @gatetest/cli`
    # only once the npm package is published. Until then the clone path
    # is the primary install method.
    # ----------------------------------------------------------------------
    - name: Install GateTest
      shell: bash
      run: |
        set -euo pipefail
        if npm install -g @gatetest/cli 2>/dev/null; then
          echo "GATETEST_BIN=gatetest" >> "$GITHUB_ENV"
          echo "Installed @gatetest/cli from npm."
        else
          # Fallback: clone the canonical repo (single source of truth).
          # TODO(publish): remove this branch once @gatetest/cli is on npm.
          GATETEST_HOME="$RUNNER_TEMP/gatetest"
          git clone --depth 1 https://github.com/crclabs-hq/gatetest.git "$GATETEST_HOME"
          chmod +x "$GATETEST_HOME/bin/gatetest.js"
          # Install runtime deps without scripts to keep this fast + safe.
          (cd "$GATETEST_HOME" && (npm ci --omit=dev --ignore-scripts 2>/dev/null || npm install --production --ignore-scripts 2>/dev/null || true))
          echo "GATETEST_BIN=node $GATETEST_HOME/bin/gatetest.js" >> "$GITHUB_ENV"
          echo "GATETEST_HOME=$GATETEST_HOME" >> "$GITHUB_ENV"
          echo "Cloned GateTest from source (npm package not yet published)."
        fi

    # ----------------------------------------------------------------------
    # 3. Run the gate. Capture the exit code without aborting the step so
    # we can emit outputs + decide whether to invoke auto-repair.
    # ----------------------------------------------------------------------
    - name: Run GateTest gate (${{ inputs.suite }})
      id: gate
      shell: bash
      env:
        GATETEST_FAIL_ON_WARNING: ${{ inputs.fail-on-warning }}
      run: |
        set -uo pipefail
        cd "${{ inputs.working-directory }}"

        REPORT_FORMAT="${{ inputs.report-format }}"
        REPORT_DIR=".gatetest/reports"
        REPORT_PATH=""
        EXTRA_FLAGS=""
        case "$REPORT_FORMAT" in
          json)    EXTRA_FLAGS="--json";   REPORT_PATH="$REPORT_DIR/gatetest-results.json";;
          sarif)   EXTRA_FLAGS="--sarif";  REPORT_PATH="$REPORT_DIR/gatetest-results.sarif";;
          junit)   EXTRA_FLAGS="--junit";  REPORT_PATH="$REPORT_DIR/gatetest-results.xml";;
          console) EXTRA_FLAGS="";         REPORT_PATH="";;
          *)
            echo "::error title=GateTest::Unknown report-format '$REPORT_FORMAT' — must be console / json / sarif / junit."
            exit 2
            ;;
        esac

        # Run the gate, capture stdout for parsing.
        set +e
        OUTPUT=$(${GATETEST_BIN} --suite "${{ inputs.suite }}" $EXTRA_FLAGS --project "$(pwd)" 2>&1)
        EXIT_CODE=$?
        set -e
        echo "$OUTPUT"

        # Parse error / warning counts from the captured output. The runner
        # emits a summary line like "Errors: N" / "Warnings: N".
        ERR_COUNT=$(printf '%s\n' "$OUTPUT" | grep -Eio '^[[:space:]]*errors?:[[:space:]]*[0-9]+' | head -1 | grep -Eio '[0-9]+' | head -1)
        WARN_COUNT=$(printf '%s\n' "$OUTPUT" | grep -Eio '^[[:space:]]*warnings?:[[:space:]]*[0-9]+' | head -1 | grep -Eio '[0-9]+' | head -1)
        ERR_COUNT="${ERR_COUNT:-0}"
        WARN_COUNT="${WARN_COUNT:-0}"

        if [ "$EXIT_CODE" -eq 0 ]; then
          GATE_STATUS="passed"
        else
          GATE_STATUS="blocked"
        fi

        # Emit outputs so downstream steps can read them. We always write
        # these BEFORE deciding to fail so the auto-fix step and any user
        # post-step can react to gate-status.
        echo "gate-status=$GATE_STATUS" >> "$GITHUB_OUTPUT"
        echo "error-count=$ERR_COUNT"   >> "$GITHUB_OUTPUT"
        echo "warning-count=$WARN_COUNT" >> "$GITHUB_OUTPUT"
        echo "report-path=$REPORT_PATH" >> "$GITHUB_OUTPUT"
        echo "exit-code=$EXIT_CODE"     >> "$GITHUB_OUTPUT"

        # Surface the verdict in the Actions UI even when the customer
        # uses an exotic theme that hides red exit codes in the log.
        if [ "$GATE_STATUS" = "blocked" ]; then
          echo "::warning title=GateTest gate blocked::$ERR_COUNT error(s), $WARN_COUNT warning(s). Suite=${{ inputs.suite }}."
        else
          echo "::notice title=GateTest gate passed::$ERR_COUNT error(s), $WARN_COUNT warning(s). Suite=${{ inputs.suite }}."
        fi

        # Defer the failure to the final step so auto-fix can run first
        # without `failure()` propagating up the workflow short-circuit.
        exit 0

    # ----------------------------------------------------------------------
    # 4. Optional AI auto-repair. Runs ONLY when the gate is blocked,
    # auto-fix is on, and ANTHROPIC_API_KEY is exposed to the action.
    # ----------------------------------------------------------------------
    - name: GateTest AI auto-repair
      if: ${{ steps.gate.outputs.gate-status == 'blocked' && inputs.auto-fix == 'true' }}
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ env.ANTHROPIC_API_KEY }}
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
        # Memory-as-a-Service opt-in. When share-learnings is on, point the
        # local recipe store at gatetest.ai/api/recipes (or the customer's
        # own URL if they supplied one). The remote-store glue
        # (website/app/lib/recipe-store-remote.js) reads this env var and
        # syncs successful fixes there. Off by default — strictly opt-in.
        # See https://gatetest.ai/trust for the privacy guarantees.
        GATETEST_RECIPE_STORE_URL: ${{ inputs.share-learnings == 'true' && (inputs.recipe-store-url != '' && inputs.recipe-store-url || 'https://gatetest.ai/api/recipes') || '' }}
      run: |
        set -uo pipefail
        if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
          echo "::warning title=GateTest auto-repair skipped::auto-fix=true but ANTHROPIC_API_KEY is not set. Add the secret to enable auto-repair."
          exit 0
        fi
        if [ -z "${GATETEST_HOME:-}" ]; then
          echo "::warning title=GateTest auto-repair skipped::GateTest was installed via npm (no source clone) so the AI CI-fixer script is unavailable. Pin to the source-clone install path to enable auto-repair."
          exit 0
        fi
        cd "${{ inputs.working-directory }}"
        # Run the AI CI-fixer NON-blocking — its own contract is "never block CI".
        set +e
        node "$GATETEST_HOME/scripts/ai-ci-fixer.js" 2>&1
        FIX_EXIT=$?
        set -e
        if [ "$FIX_EXIT" -ne 0 ]; then
          echo "::warning title=GateTest auto-repair exited non-zero::See log above. The gate verdict still stands."
        fi
        exit 0

    # ----------------------------------------------------------------------
    # 4b. Post inline `suggestion` review comments on the source PR.
    # Runs ONLY after auto-repair, ONLY when triggered from a pull_request
    # event, and ONLY when the fix engine produced patches. Reads the
    # snapshot at `.gatetest/fix-patches.json` written by applyPatches.
    #
    # GitHub renders ```suggestion``` blocks with a one-click "Commit
    # suggestion" button. Reviewers apply fixes WITHOUT leaving the GitHub
    # UI — no checkout, no rebase, no separate PR review cycle. This is
    # the headline product surface for the launch.
    #
    # Failures are non-blocking. The consolidated auto-repair PR opens
    # regardless; inline suggestions are an additive surface.
    # ----------------------------------------------------------------------
    - name: Post inline suggestion blocks on source PR
      if: ${{ steps.gate.outputs.gate-status == 'blocked' && inputs.auto-fix == 'true' && (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
      run: |
        set -uo pipefail
        if [ -z "${GATETEST_HOME:-}" ]; then
          # npm-install branch — script not on disk. Inline suggestions
          # only ship on the source-clone install path until @gatetest/cli
          # is published. Quiet skip — auto-repair PR still ships.
          exit 0
        fi
        cd "${{ inputs.working-directory }}"
        # Non-blocking: the script ALWAYS exits 0. We just log.
        node "$GATETEST_HOME/scripts/post-suggestions-from-snapshot.js" || true
        exit 0

    # ----------------------------------------------------------------------
    # 4c. Track non-fixable findings as GitHub Issues. Opt-in via
    # `track-non-fixable: true`. Runs whenever the gate has produced a
    # JSON report (gate passed OR blocked — every error-severity finding
    # gets surfaced), gated on a GITHUB_TOKEN being present and the
    # source-clone install path (npm install of @gatetest/cli ships the
    # CLI binary but not the tracking script).
    #
    # Idempotency: every issue carries a signature marker derived from
    # (module, file, line, check) — re-scans match the marker and SKIP
    # opening a duplicate. Auto-close is V2 (the issue stays open until
    # the customer closes it manually).
    #
    # Failures are non-blocking — workflow proceeds regardless of any
    # issue-creation error.
    # ----------------------------------------------------------------------
    - name: Track non-fixable findings as GitHub Issues
      if: ${{ inputs.track-non-fixable == 'true' && (always() || steps.gate.outputs.gate-status == 'blocked') }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
      run: |
        set -uo pipefail
        if [ -z "${GATETEST_HOME:-}" ]; then
          # npm-install branch — script not on disk. Quiet skip; the
          # consolidated PR / inline suggestions still cover the
          # auto-fixable surface.
          exit 0
        fi
        cd "${{ inputs.working-directory }}"
        node "$GATETEST_HOME/scripts/track-non-fixable.js" || true
        exit 0

    # ----------------------------------------------------------------------
    # 5a. Optional mutation testing. Runs only when explicitly enabled,
    # regardless of gate verdict, because mutation testing is a TEST-quality
    # signal — it tells you whether your tests actually catch bugs.
    # Mutation testing requires running the customer's test runner, which
    # is why it lives in the Action (CI side) not on Vercel serverless.
    # By default a failing mutation score does NOT block the merge —
    # it's coaching feedback. Flip `mutation-blocks-merge: true` to gate.
    # ----------------------------------------------------------------------
    - name: Mutation testing
      if: ${{ inputs.mutation == 'true' && always() }}
      shell: bash
      run: |
        echo "Running mutation testing — this exercises the customer test runner"
        cd "${{ inputs.working-directory }}"
        set +e
        ${GATETEST_BIN} --module mutation
        MUTATION_EXIT=$?
        set -e
        if [ "$MUTATION_EXIT" -ne 0 ] && [ "${{ inputs.mutation-blocks-merge }}" = "true" ]; then
          echo "::error title=GateTest mutation::Mutation score below threshold and mutation-blocks-merge=true."
          exit "$MUTATION_EXIT"
        elif [ "$MUTATION_EXIT" -ne 0 ]; then
          echo "::warning title=GateTest mutation::Mutation score below threshold. Set mutation-blocks-merge=true to gate."
        fi
        exit 0
      env:
        NODE_ENV: test

    # ----------------------------------------------------------------------
    # 5b. Optional chaos / runtime testing. Runs only when explicitly
    # enabled AND a chaos-url is supplied. Chaos testing drives a real
    # browser (Playwright + Chromium) against a deployed URL, so it
    # cannot run on Vercel serverless — that's why it lives in the
    # Action. Failures are surfaced as warnings by default because
    # runtime resilience is a sliding scale, not a binary gate.
    # Flip `chaos-blocks-merge: true` to block on runtime failures.
    # ----------------------------------------------------------------------
    - name: Chaos / runtime testing
      if: ${{ inputs.chaos == 'true' && inputs.chaos-url != '' && always() }}
      shell: bash
      run: |
        echo "Installing Playwright Chromium binary..."
        npx playwright install --with-deps chromium
        echo "Running chaos / runtime checks against ${{ inputs.chaos-url }}"
        cd "${{ inputs.working-directory }}"
        set +e
        ${GATETEST_BIN} --module chaos
        CHAOS_EXIT=$?
        set -e
        if [ "$CHAOS_EXIT" -ne 0 ] && [ "${{ inputs.chaos-blocks-merge }}" = "true" ]; then
          echo "::error title=GateTest chaos::Runtime checks failed and chaos-blocks-merge=true."
          exit "$CHAOS_EXIT"
        elif [ "$CHAOS_EXIT" -ne 0 ]; then
          echo "::warning title=GateTest chaos::Runtime checks surfaced issues. Set chaos-blocks-merge=true to gate."
        fi
        exit 0
      env:
        GATETEST_CHAOS_URL: ${{ inputs.chaos-url }}

    # ----------------------------------------------------------------------
    # 6. Final step — propagate the gate verdict as the action's exit code.
    # This is the LAST step so auto-fix + optional mutation/chaos have had
    # their chance to run first. Mutation / chaos failures do NOT change
    # the gate verdict on their own — they have their own opt-in
    # `*-blocks-merge` toggles which exit non-zero before we reach here.
    # ----------------------------------------------------------------------
    - name: Enforce gate verdict
      shell: bash
      run: |
        if [ "${{ steps.gate.outputs.gate-status }}" = "blocked" ]; then
          echo "GateTest gate blocked: ${{ steps.gate.outputs.error-count }} error(s), ${{ steps.gate.outputs.warning-count }} warning(s)."
          exit 1
        fi
        echo "GateTest gate passed: ${{ steps.gate.outputs.error-count }} error(s), ${{ steps.gate.outputs.warning-count }} warning(s)."
